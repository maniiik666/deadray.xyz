<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeadRay — 404</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/vcr-osd-mono" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --w: #ffffff;
            --d: #020202;
            --m: #0a0a0a;
            --b: #141414;
            --cold: #aaaaaa;
            --cold2: #cccccc;
            --muted: #666666;
            --faint: rgba(255, 255, 255, 0.08);
        }

        html {
            background: var(--d);
            min-height: 100vh;
        }

        body {
            background: var(--d);
            color: var(--w);
            font-family: 'VCR OSD Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ── BACKGROUND GLITCHES ── */
        .bg-glitches {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.15;
        }

        .bg-glitch-box {
            position: absolute;
            background: #fff;
            animation: bg-glitch-anim 4s infinite linear alternate-reverse;
        }

        .bg-glitch-box:nth-child(1) {
            top: 20%;
            left: 10%;
            width: 120px;
            height: 2px;
            animation-duration: 3s;
        }

        .bg-glitch-box:nth-child(2) {
            top: 60%;
            right: 15%;
            width: 80px;
            height: 1px;
            animation-duration: 5s;
        }

        .bg-glitch-box:nth-child(3) {
            top: 80%;
            left: 30%;
            width: 150px;
            height: 3px;
            animation-duration: 4.5s;
        }

        .bg-glitch-box:nth-child(4) {
            top: 40%;
            left: 60%;
            width: 50px;
            height: 2px;
            animation-duration: 2.5s;
        }

        .bg-glitch-box:nth-child(5) {
            top: 35%;
            right: 25%;
            width: 90px;
            height: 2px;
            animation-duration: 4s;
        }

        .bg-glitch-box:nth-child(6) {
            top: 70%;
            left: 50%;
            width: 110px;
            height: 1px;
            animation-duration: 3.5s;
        }

        .bg-glitch-box:nth-child(7) {
            top: 15%;
            left: 45%;
            width: 60px;
            height: 3px;
            animation-duration: 2.8s;
        }

        .bg-glitch-box:nth-child(8) {
            top: 85%;
            right: 40%;
            width: 130px;
            height: 2px;
            animation-duration: 5.2s;
        }

        @keyframes bg-glitch-anim {
            0% {
                opacity: 0;
                transform: translateX(0);
            }

            10% {
                opacity: 0;
            }

            11% {
                opacity: 1;
                transform: translateX(10px);
            }

            13% {
                opacity: 0;
                transform: translateX(-10px);
            }

            50% {
                opacity: 0;
            }

            51% {
                opacity: 1;
                transform: translateX(-5px);
            }

            53% {
                opacity: 0;
                transform: translateX(5px);
            }

            100% {
                opacity: 0;
            }
        }

        /* ── SCANLINES OVERLAY ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.04) 2px,
                    rgba(0, 0, 0, 0.04) 3px);
            pointer-events: none;
            z-index: 1;
        }

        /* ── MAIN BLOCK ── */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            padding: 0 28px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* ── 404 NUMBER ── */
        .error-code {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(80px, 22vw, 120px);
            line-height: 1;
            color: var(--d);
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.15);
            letter-spacing: -0.02em;
            position: relative;
            user-select: none;
            animation: fadeup 0.6s 0.1s ease both;
        }

        /* glitch layers on 404 */
        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            inset: 0;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: inherit;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .error-code::before {
            color: rgba(255, 255, 255, 0.06);
            animation: glitch-a 6s steps(1) infinite;
            clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
        }

        .error-code::after {
            color: rgba(255, 255, 255, 0.04);
            animation: glitch-b 6s steps(1) infinite;
            clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
        }

        @keyframes glitch-a {

            0%,
            89%,
            100% {
                transform: none;
                opacity: 0;
            }

            90% {
                transform: translateX(4px);
                opacity: 1;
            }

            91% {
                transform: translateX(-3px);
                opacity: 0;
            }

            92% {
                transform: translateX(5px);
                opacity: 1;
            }

            93% {
                transform: none;
                opacity: 0;
            }
        }

        @keyframes glitch-b {

            0%,
            85%,
            100% {
                transform: none;
                opacity: 0;
            }

            86% {
                transform: translateX(-4px);
                opacity: 1;
            }

            87% {
                transform: translateX(2px);
                opacity: 0;
            }

            88% {
                transform: translateX(-5px);
                opacity: 1;
            }

            89% {
                transform: none;
                opacity: 0;
            }
        }

        /* ── DIVIDER ── */
        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0 24px;
            animation: fadeup 0.6s 0.3s ease both;
            position: relative;
            overflow: hidden;
        }

        /* animated scan on divider */
        .divider::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: divider-scan 4s ease-in-out infinite;
        }

        @keyframes divider-scan {
            0% {
                left: -60%;
            }

            100% {
                left: 160%;
            }
        }

        /* ── LABEL ── */
        .label {
            font-family: 'Syncopate', sans-serif;
            font-size: 7px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            animation: fadeup 0.6s 0.4s ease both;
        }

        /* ── MESSAGE ── */
        .message {
            font-family: 'VCR OSD Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.06em;
            color: var(--cold2);
            line-height: 1.7;
            animation: fadeup 0.6s 0.5s ease both;
        }

        /* cursor blink on last char */
        .message .cursor {
            display: inline-block;
            width: 8px;
            height: 13px;
            background: var(--muted);
            vertical-align: middle;
            margin-left: 3px;
            animation: blink 1.1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── BACK LINK ── */
        .back-wrap {
            margin-top: 40px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 20px;
            animation: fadeup 0.6s 0.8s ease both;
        }

        .back {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            text-decoration: none;
            color: var(--w);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.18s;
            position: relative;
            overflow: hidden;
        }

        .back::before {
            content: '';
            position: absolute;
            left: -100%;
            bottom: 0;
            width: 100%;
            height: 1px;
            background: var(--w);
            transition: left 0.3s ease;
        }

        .back:hover::before {
            left: 0;
        }

        .back:hover {
            padding-left: 6px;
        }

        .back-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-icon {
            width: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .back-icon svg {
            width: 16px;
            height: 16px;
            fill: var(--muted);
            transition: fill 0.18s;
        }

        .back:hover .back-icon svg {
            fill: var(--w);
        }

        .back-name {
            font-family: 'VCR OSD Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--w);
        }

        .back-arrow {
            font-family: 'Syncopate', sans-serif;
            font-size: 9px;
            color: var(--muted);
            transition: color 0.18s, transform 0.18s;
        }

        .back:hover .back-arrow {
            color: var(--w);
            transform: translateX(4px);
        }

        /* ── FOOTER ── */
        .footer {
            margin-top: 44px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            text-align: left;
            width: 100%;
            animation: fadeup 0.8s 1s ease both;
        }

        .footer-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 7px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            line-height: 2.2;
        }

        .footer-text a {
            color: var(--muted);
            text-decoration: none;
            transition: color 0.18s;
        }

        .footer-text a:hover {
            color: var(--w);
        }

        @keyframes fadeup {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>

    <div class="bg-glitches">
        <div class="bg-glitch-box"></div>
        <div class="bg-glitch-box"></div>
        <div class="bg-glitch-box"></div>
        <div class="bg-glitch-box"></div>
        <div class="bg-glitch-box"></div>
        <div class="bg-glitch-box"></div>
        <div class="bg-glitch-box"></div>
        <div class="bg-glitch-box"></div>
    </div>

    <div class="container">

        <div class="error-code">404</div>

        <div class="divider"></div>

        <div class="label">Error</div>
        <div class="message">
            signal lost.<br>
            this page does not exist.<span class="cursor"></span>
        </div>

        <div class="back-wrap">
            <a href="/" class="back">
                <div class="back-left">
                    <div class="back-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                        </svg>
                    </div>
                    <span class="back-name">Return to DeadRay</span>
                </div>
                <span class="back-arrow">→</span>
            </a>
        </div>

        <div class="footer">
            <div class="footer-text">
                DeadRay &nbsp;·&nbsp; <a href="https://man1k.xyz" target="_blank">man1k.xyz</a>
            </div>
        </div>

    </div>

</body>

</html>
