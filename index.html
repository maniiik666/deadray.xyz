  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --w: #ffffff;
      --d: #020202;
      --m: #0a0a0a;
      --b: #141414;
      --cold: #aaaaaa;
      --cold2: #cccccc;
      --muted: #666666;
      --faint: rgba(255, 255, 255, 0.08);
    }

    html {
      background: var(--d);
      min-height: 100vh
    }

    body {
      background: var(--d);
      color: var(--w);
      font-family: 'VCR OSD Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── COVER BLOCK ── */
    .cover-block {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    .cover-img {
      width: 100%;
      display: block;
      filter: grayscale(1) contrast(1.1) brightness(0.92);
      position: relative;
      z-index: 1;
    }

    /* Cold tone overlay */
    .cover-block::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          rgba(2, 2, 2, 0) 0%,
          rgba(2, 2, 2, 0) 50%,
          rgba(2, 2, 2, 0.6) 80%,
          rgba(2, 2, 2, 0.98) 100%),
        radial-gradient(ellipse at 50% 30%, rgba(200, 200, 200, 0.12) 0%, transparent 60%);
      z-index: 2;
      pointer-events: none;
    }

    /* Scanlines */
    .cover-block::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.06) 2px,
          rgba(0, 0, 0, 0.06) 3px);
      z-index: 3;
      pointer-events: none;
    }

    /* ── GLITCH ON COVER ── */
    .glitch-wrap {
      position: absolute;
      inset: 0;
      z-index: 4;
      overflow: hidden;
      pointer-events: none;
    }

    .glitch-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.25);
      opacity: 0;
      animation: scanline 8s linear infinite;
    }

    .glitch-line:nth-child(1) {
      animation-delay: 0s;
    }

    .glitch-line:nth-child(2) {
      animation-delay: 2.7s;
    }

    .glitch-line:nth-child(3) {
      animation-delay: 5.1s;
    }

    .glitch-line:nth-child(4) {
      animation-delay: 1.5s;
      height: 2px;
    }

    .glitch-line:nth-child(5) {
      animation-delay: 6.8s;
      height: 3px;
    }

    /* ── BACKGROUND GLITCHES ── */
    .bg-glitches {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.15;
    }

    .bg-glitch-box {
      position: absolute;
      background: #fff;
      animation: bg-glitch-anim 4s infinite linear alternate-reverse;
    }

    .bg-glitch-box:nth-child(1) {
      top: 20%;
      left: 10%;
      width: 120px;
      height: 2px;
      animation-duration: 3s;
    }

    .bg-glitch-box:nth-child(2) {
      top: 60%;
      right: 15%;
      width: 80px;
      height: 1px;
      animation-duration: 5s;
    }

    .bg-glitch-box:nth-child(3) {
      top: 80%;
      left: 30%;
      width: 150px;
      height: 3px;
      animation-duration: 4.5s;
    }

    .bg-glitch-box:nth-child(4) {
      top: 40%;
      left: 60%;
      width: 50px;
      height: 2px;
      animation-duration: 2.5s;
    }

    .bg-glitch-box:nth-child(5) {
      top: 35%;
      right: 25%;
      width: 90px;
      height: 2px;
      animation-duration: 4s;
    }

    .bg-glitch-box:nth-child(6) {
      top: 70%;
      left: 50%;
      width: 110px;
      height: 1px;
      animation-duration: 3.5s;
    }

    .bg-glitch-box:nth-child(7) {
      top: 15%;
      left: 45%;
      width: 60px;
      height: 3px;
      animation-duration: 2.8s;
    }

    .bg-glitch-box:nth-child(8) {
      top: 85%;
      right: 40%;
      width: 130px;
      height: 2px;
      animation-duration: 5.2s;
    }

    @keyframes bg-glitch-anim {
      0% {
        opacity: 0;
        transform: translateX(0);
      }

      10% {
        opacity: 0;
      }

      11% {
        opacity: 1;
        transform: translateX(10px);
      }

      13% {
        opacity: 0;
        transform: translateX(-10px);
      }

      50% {
        opacity: 0;
      }

      51% {
        opacity: 1;
        transform: translateX(-5px);
      }

      53% {
        opacity: 0;
        transform: translateX(5px);
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes scanline {
      0% {
        opacity: 0;
        top: 0
      }

      2% {
        opacity: 1
      }

      98% {
        opacity: 0.4
      }

      100% {
        opacity: 0;
        top: 100%
      }
    }

    /* RGB shift ghost */
    .cover-ghost {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .cover-ghost img {
      width: 100%;
      display: block;
      filter: grayscale(1) brightness(0.85);
      opacity: 0;
      animation: ghostshift 10s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes ghostshift {

      0%,
      90%,
      100% {
        opacity: 0;
        transform: none
      }

      92% {
        opacity: 0.15;
        transform: translateX(3px)
      }

      94% {
        opacity: 0;
        transform: translateX(-2px)
      }

      96% {
        opacity: 0.1;
        transform: translateX(4px)
      }

      98% {
        opacity: 0
      }
    }

    /* ── CONTENT ── */
    .content {
      width: 100%;
      max-width: 480px;
      padding: 0 28px 60px;
      margin-top: -2px;
      position: relative;
      z-index: 5;
      background: linear-gradient(to bottom, rgba(4, 4, 4, 0) 0%, var(--d) 32px);
    }

    .title-block {
      padding-top: 20px;
      padding-bottom: 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .artist {
      font-family: 'Syncopate', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--cold2);
      margin-bottom: 8px;
      /* glitch on load */
      animation: titleglitch 0.4s steps(1) 0.3s both;
    }

    @keyframes titleglitch {
      0% {
        opacity: 0;
        transform: translateX(4px)
      }

      25% {
        opacity: 1;
        transform: translateX(-2px)
      }

      50% {
        opacity: 0;
        transform: translateX(3px)
      }

      75% {
        opacity: 1;
        transform: translateX(-1px)
      }

      100% {
        opacity: 1;
        transform: none
      }
    }

    .track {
      font-size: 38px;
      font-family: 'VCR OSD Mono', monospace;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.01em;
      animation: fadeup 0.8s 0.5s ease both;
    }

    .tags {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      animation: fadeup 0.8s 0.7s ease both;
    }

    .tag {
      font-family: 'Syncopate', sans-serif;
      font-size: 7.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 4px 9px;
    }

    .tag.now {
      color: var(--w);
      border-color: rgba(255, 255, 255, 0.3);
      animation: pulse 3s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        border-color: rgba(255, 255, 255, 0.3)
      }

      50% {
        border-color: rgba(255, 255, 255, 0.7)
      }
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Syncopate', sans-serif;
      font-size: 7px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 28px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeup 0.8s 0.9s ease both;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    /* ── DSP LINKS ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .dsp {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      text-decoration: none;
      color: var(--w);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeup 0.5s ease forwards;
    }

    .dsp:nth-child(1) {
      animation-delay: 1.0s
    }

    .dsp:nth-child(2) {
      animation-delay: 1.1s
    }

    .dsp:nth-child(3) {
      animation-delay: 1.2s
    }

    .dsp:nth-child(4) {
      animation-delay: 1.3s
    }

    .dsp:nth-child(5) {
      animation-delay: 1.4s
    }

    .dsp:nth-child(6) {
      animation-delay: 1.5s
    }

    .dsp:nth-child(7) {
      animation-delay: 1.6s
    }

    .dsp:nth-child(8) {
      animation-delay: 1.7s
    }

    /* glitch hover line */
    .dsp::before {
      content: '';
      position: absolute;
      left: -100%;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: var(--w);
      transition: left 0.3s ease;
    }

    .dsp:hover::before {
      left: 0
    }

    .dsp:hover {
      color: #fff;
      padding-left: 6px;
    }

    .dsp-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .dsp-icon {
      width: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .dsp-icon svg {
      width: 18px;
      height: 18px;
      fill: var(--muted);
      transition: fill 0.18s;
    }

    .dsp-icon i {
      font-size: 18px;
      color: var(--muted);
      transition: color 0.18s;
    }

    .dsp:hover .dsp-icon svg {
      fill: var(--w)
    }

    .dsp:hover .dsp-icon i {
      color: var(--w)
    }

    .dsp-name {
      font-family: 'VCR OSD Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .dsp-arrow {
      font-family: 'Syncopate', sans-serif;
      font-size: 9px;
      color: var(--muted);
      transition: color 0.18s, transform 0.18s;
    }

    .dsp:hover .dsp-arrow {
      color: var(--w);
      transform: translateX(4px);
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 44px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      text-align: center;
      animation: fadeup 0.8s 2s ease both;
    }

    .footer-text {
      font-family: 'Syncopate', sans-serif;
      font-size: 7px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 2.2;
    }

    .footer-text a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.18s;
    }

    .footer-text a:hover {
      color: var(--w)
    }

    @keyframes fadeup {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }
  </style>
</head>
